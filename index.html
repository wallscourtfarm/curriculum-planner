<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WFA Curriculum Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: #f8fafc; color: #1e293b; font-size: 15px; }

/* ── Nav ── */
nav {
  background: #fff; border-bottom: 2px solid #e2e8f0;
  padding: 0 20px; display: flex; align-items: center; gap: 16px;
  position: sticky; top: 0; z-index: 100; height: 56px;
}
.nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.nav-logo-icon { width: 36px; height: 36px; background: #1798d3; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; }
.nav-logo-icon svg { width: 22px; height: 22px; fill: #fff; }
.nav-title { font-weight: 800; font-size: 16px; color: #0f172a; }
.nav-sub { font-size: 12px; color: #64748b; font-weight: 600; }
nav .spacer { flex: 1; }
.nav-version { font-size: 11px; color: #94a3b8; font-weight: 600; letter-spacing: .5px; }

/* ── Year bar ── */
#year-bar {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 10px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
#year-bar .bar-label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase;
  letter-spacing: .5px; margin-right: 4px; }
.year-chip {
  padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
  border: 2px solid transparent; cursor: pointer; transition: all .15s; background: #f1f5f9; color: #475569;
}
.year-chip:hover { opacity: .85; }
.year-chip.active { color: #fff; }
.cross-chip {
  padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
  border: 2px solid #cbd5e1; cursor: pointer; transition: all .15s; background: #fff; color: #475569;
  margin-left: 8px;
}
.cross-chip:hover { background: #f1f5f9; }
.cross-chip.active { background: #0f172a; color: #fff; border-color: #0f172a; }

/* ── View tabs ── */
#view-tabs {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 0 20px; display: flex; align-items: stretch;
}
.view-tab {
  padding: 12px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
  border-bottom: 3px solid transparent; color: #64748b; transition: all .15s;
  white-space: nowrap; background: none; border-top: none; border-left: none; border-right: none;
}
.view-tab:hover { color: #1798d3; }
.view-tab.active { color: #1798d3; border-bottom-color: #1798d3; }

/* ── Term selector ── */
.term-selector {
  padding: 12px 20px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  border-bottom: 1px solid #e2e8f0; background: #fff;
}
.term-selector .bar-label { font-size: 12px; font-weight: 700; color: #64748b;
  text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }
.term-chip {
  padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
  border: 2px solid #e2e8f0; cursor: pointer; transition: all .15s; background: #fff; color: #475569;
}
.term-chip:hover { border-color: #94a3b8; }
.term-chip.active { border-color: #1798d3; background: #1798d3; color: #fff; }

/* ── Views ── */
.view { display: none; }
.view.active { display: block; }

/* ── Timeline view ── */
#view-timeline { overflow: hidden; }
.timeline-scroll { overflow-x: auto; padding: 0 20px 20px; }
.timeline-inner { min-width: max-content; }

.tl-header-row { display: flex; align-items: stretch; height: 28px; margin-top: 16px; }
.tl-sob-label-hdr { width: 150px; flex-shrink: 0; }
.tl-term-header { display: flex; gap: 8px; }
.tl-term-block {
  display: flex; align-items: center; justify-content: center;
  background: #f1f5f9; border-radius: 6px 6px 0 0;
  font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: .5px;
}

.tl-weeks-row { display: flex; align-items: center; height: 22px; margin-bottom: 6px; }
.tl-sob-label-wk { width: 150px; flex-shrink: 0; }
.tl-week-hdr { display: flex; gap: 8px; }
.tl-term-wks { display: flex; }
.tl-wk-num { width: 34px; font-size: 10px; font-weight: 600; color: #94a3b8; text-align: center; flex-shrink: 0; }

.tl-row { display: flex; align-items: center; margin-bottom: 6px; min-height: 46px; }
.tl-sob-label { width: 150px; flex-shrink: 0; font-size: 11px; font-weight: 700;
  color: #64748b; padding-right: 12px; text-align: right; line-height: 1.2; }
.tl-lanes { display: flex; gap: 8px; }
.tl-term-lane { position: relative; height: 46px; flex-shrink: 0; background: #f1f5f9; border-radius: 4px; }
.tl-block {
  position: absolute; top: 4px; height: 38px; border-radius: 6px;
  display: flex; align-items: center; padding: 0 8px; gap: 5px;
  cursor: pointer; transition: transform .1s, box-shadow .1s;
  overflow: hidden;
}
.tl-block:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.25); }
.tl-block.selected { box-shadow: 0 0 0 3px #fff, 0 0 0 5px #0f172a; }
.tl-bid { font-size: 11px; font-weight: 800; opacity: .9; white-space: nowrap; flex-shrink: 0; }
.tl-bq { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: .85; }
.tl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-left: auto;
  border: 1.5px solid rgba(255,255,255,.5); }

/* ── Detail panel ── */
#detail-panel {
  background: #fff; border-top: 2px solid #e2e8f0; border-bottom: 2px solid #e2e8f0;
  padding: 20px 24px; display: none; position: relative;
}
#detail-panel.open { display: block; }
.dp-close { position: absolute; top: 14px; right: 16px; background: none; border: none;
  font-size: 20px; cursor: pointer; color: #94a3b8; line-height: 1; }
.dp-close:hover { color: #475569; }
.dp-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
.dp-badge { display: inline-flex; padding: 4px 12px; border-radius: 20px; font-size: 12px;
  font-weight: 800; color: #fff; white-space: nowrap; align-self: flex-start; margin-top: 3px; }
.dp-title { font-size: 18px; font-weight: 800; color: #0f172a; line-height: 1.3; }
.dp-meta { display: flex; flex-wrap: wrap; gap: 20px; font-size: 13px; color: #475569; }
.dp-mi { display: flex; flex-direction: column; gap: 3px; }
.dp-ml { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #94a3b8; }
.dp-mv { font-weight: 600; max-width: 280px; line-height: 1.4; }
.dp-status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px;
  border-radius: 20px; font-size: 12px; font-weight: 700; }

/* ── Cards view ── */
#view-cards .cards-wrap { padding: 20px; }
.cards-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
.card {
  background: #fff; border-radius: 12px; border: 2px solid #e2e8f0;
  padding: 16px; cursor: pointer; transition: border-color .15s, box-shadow .15s;
}
.card:hover { border-color: #94a3b8; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
.card-hdr { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.card-id { font-size: 12px; font-weight: 800; color: #94a3b8; }
.card-sob { display: inline-flex; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; color: #fff; }
.card-sdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-left: auto; }
.card-title { font-size: 14px; font-weight: 700; color: #0f172a; line-height: 1.4; margin-bottom: 8px; }
.card-row { font-size: 12px; color: #475569; margin-bottom: 4px; line-height: 1.4; }
.card-row strong { color: #334155; }

/* ── Cross-year view ── */
#view-cross .cross-wrap { padding: 20px; overflow-x: auto; }
.cross-grid { min-width: 900px; }
.cross-hdr-row { display: grid; gap: 8px; padding-bottom: 8px; border-bottom: 2px solid #e2e8f0; margin-bottom: 10px; }
.cross-row { display: grid; gap: 8px; margin-bottom: 10px; align-items: start; }
.cross-sob-label { display: flex; align-items: flex-start; padding-top: 8px; }
.cross-sob-pill { display: inline-flex; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; color: #fff; }
.cross-cell {
  background: #fff; border-radius: 8px; border: 2px solid #e2e8f0;
  padding: 8px 10px; min-height: 60px; cursor: pointer; transition: border-color .1s;
}
.cross-cell:hover { border-color: #94a3b8; }
.cross-cell-empty { background: #f8fafc; border-radius: 8px; border: 2px solid transparent; min-height: 60px; }
.cross-cell .c-id { font-size: 11px; font-weight: 800; color: #94a3b8; }
.cross-cell .c-q { font-size: 12px; font-weight: 600; color: #1e293b; line-height: 1.3; margin-top: 3px; }
.cross-cell .c-text { font-size: 11px; color: #94a3b8; margin-top: 4px; }

/* ── Planning status ── */
.pill-new    { background: #fef2f2; color: #dc2626; }
.pill-some   { background: #fffbeb; color: #d97706; }
.pill-existing { background: #f0fdf4; color: #16a34a; }
.pill-unknown { background: #f8fafc; color: #94a3b8; }

/* ── Empty state ── */
.empty-state { padding: 60px 20px; text-align: center; color: #94a3b8; }
.empty-state h3 { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #64748b; }

/* ── Footer ── */
footer {
  padding: 16px 20px; border-top: 1px solid #e2e8f0; margin-top: 40px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: #94a3b8;
}
footer strong { color: #64748b; }
</style>
</head>

    const active = k === curYear && curView !== 'cross';
    const btn = document.createElement('button');
    btn.className = 'year-chip' + (active ? ' active' : '');
    btn.textContent = k + ' · ' + d.learningZone.replace(' Learning Zone','');
    if (active) { btn.style.background = d.colour; btn.style.borderColor = d.colour; }
    btn.onclick = () => { if (curView === 'cross') curView = 'timeline'; selectYear(k); };
    bar.appendChild(btn);
  });
  const cx = document.createElement('button');
  cx.className = 'cross-chip' + (curView === 'cross' ? ' active' : '');
  cx.textContent = 'All years';
  cx.onclick = () => selectView('cross');
  bar.appendChild(cx);
}

// ── View switching ────────────────────────────────────────────────────────────
function selectView(v) {
  curView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.view-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  [{v:'timeline',i:0},{v:'cards',i:1},{v:'cross',i:2}].forEach(({v:vv,i}) => {
    if (vv === v) document.querySelectorAll('.view-tab')[i].classList.add('active');
  });
  buildYearBar();
  if (v === 'timeline') renderTimeline();
  else if (v === 'cards') { buildTermSel('cards'); renderCards(); }
  else { buildTermSel('cross'); renderCross(); }
  updateHash();
}

function selectYear(k) {
  curYear = k; buildYearBar();
  if (curView === 'timeline') renderTimeline();
  else if (curView === 'cards') renderCards();
  updateHash();
}

function selectTerm(t, v) {
  curTerm = t;
  document.querySelectorAll('.' + v + '-tc').forEach(el => el.classList.remove('active'));
  document.getElementById(v + '-tc-' + t).classList.add('active');
  if (v === 'cards') renderCards(); else renderCross();
  updateHash();
}

function buildTermSel(v) {
  const el = document.getElementById(v + '-term-sel');
  el.innerHTML = '<span class="bar-label">Term</span>';
  for (let t = 1; t <= 6; t++) {
    const b = document.createElement('button');
    b.className = 'term-chip ' + v + '-tc' + (t === curTerm ? ' active' : '');
    b.id = v + '-tc-' + t;
    b.textContent = 'T' + t + ' — ' + TERM_NM[t-1];
    b.onclick = () => selectTerm(t, v);
    el.appendChild(b);
  }
}

// ── Timeline ──────────────────────────────────────────────────────────────────
function renderTimeline() {
  const d = YEAR_DATA[curYear];
  const enqs = d.enquiries;
  const states = SOB_ORDER.filter(s => enqs.some(e => e.stateOfBeing === s));
  const el = document.getElementById('timeline-inner');

  // Term header
  let h = '<div class="tl-header-row"><div class="tl-sob-label-hdr"></div><div class="tl-term-header">';
  TERM_WK.forEach((wk, i) => {
    h += `<div class="tl-term-block" style="width:${termW(i)}px">T${i+1} · ${TERM_NM[i]}</div>`;
  });
  h += '</div></div>';

  // Week numbers
  h += '<div class="tl-weeks-row"><div class="tl-sob-label-wk"></div><div class="tl-week-hdr">';
  TERM_WK.forEach(wk => {
    h += '<div class="tl-term-wks">';
    for (let w = 1; w <= wk; w++) h += `<div class="tl-wk-num">${w}</div>`;
    h += '</div>';
  });
  h += '</div></div>';

  // State rows
  states.forEach(state => {
    const bg = sc(state);
    h += '<div class="tl-row"><div class="tl-sob-label">' + state + '</div><div class="tl-lanes">';
    TERM_WK.forEach((wk, ti) => {
      const term = ti + 1;
      h += `<div class="tl-term-lane" style="width:${termW(ti)}px">`;
      enqs.filter(e => e.stateOfBeing === state && e.term === term).forEach(e => {
        const lx = (e.weekStart - 1) * WEEK_W;
        const wx = enqWidth(e);
        const sel = selEnq === e.id;
        const dot = SDOT[e.planningStatus] || SDOT.unknown;
        const shortQ = wx > 68 ? (e.keyQuestion.length > 26 ? e.keyQuestion.slice(0,24)+'…' : e.keyQuestion) : '';
        h += `<div class="tl-block${sel?' selected':''}" style="left:${lx}px;width:${wx}px;background:${bg};color:#fff" onclick="openDetail('${e.id}')" title="${e.id}: ${e.keyQuestion}">`;
        h += `<span class="tl-bid">${e.id}</span>`;
        if (shortQ) h += `<span class="tl-bq">${shortQ}</span>`;
        h += `<span class="tl-dot" style="background:${dot}"></span>`;
        h += '</div>';
      });
      h += '</div>';
    });
    h += '</div></div>';
  });

  el.innerHTML = h;
}

// ── Detail panel ──────────────────────────────────────────────────────────────
function openDetail(id) {
  selEnq = id;
  const e = YEAR_DATA[curYear].enquiries.find(x => x.id === id);
  if (!e) return;
  const bg = sc(e.stateOfBeing);
  const wkTxt = e.weekStart === e.weekEnd ? `T${e.term} · week ${e.weekStart}` : `T${e.term} · weeks ${e.weekStart}–${e.weekEnd}`;

  let h = `<div class="dp-header">
    <span class="dp-badge" style="background:${bg}">${e.stateOfBeing}</span>
    <div>
      <div style="font-size:11px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Enquiry ${e.id} &middot; ${wkTxt}</div>
      <div class="dp-title">${e.keyQuestion}</div>
    </div>
  </div><div class="dp-meta">`;

  if (e.linkedText) h += `<div class="dp-mi"><div class="dp-ml">Linked text</div><div class="dp-mv">${e.linkedText}</div></div>`;
  if (e.genre)      h += `<div class="dp-mi"><div class="dp-ml">Genre</div><div class="dp-mv">${e.genre}</div></div>`;
  if (e.writingOutcome) h += `<div class="dp-mi"><div class="dp-ml">Writing outcome</div><div class="dp-mv">${e.writingOutcome}</div></div>`;
  if (SLB[e.planningStatus]) h += `<div class="dp-mi"><div class="dp-ml">Planning</div><div class="dp-mv"><span class="dp-status-pill ${SPILL[e.planningStatus]}">${SLB[e.planningStatus]}</span></div></div>`;

  h += '</div>';
  document.getElementById('detail-content').innerHTML = h;
  document.getElementById('detail-panel').classList.add('open');
  renderTimeline();
}

function closeDetail() {
  selEnq = null;
  document.getElementById('detail-panel').classList.remove('open');
}

// ── Cards ─────────────────────────────────────────────────────────────────────
function renderCards() {
  const enqs = YEAR_DATA[curYear].enquiries.filter(e => e.term === curTerm);
  const grid = document.getElementById('cards-grid');
  if (!enqs.length) { grid.innerHTML = '<div class="empty-state"><h3>No enquiries planned for this term</h3></div>'; return; }
  grid.innerHTML = enqs.map(e => {
    const bg = sc(e.stateOfBeing);
    const dot = SDOT[e.planningStatus] || SDOT.unknown;
    const wk = e.weekStart === e.weekEnd ? `W${e.weekStart}` : `W${e.weekStart}–W${e.weekEnd}`;
    return `<div class="card" onclick="openCardDetail('${e.id}')">
      <div class="card-hdr">
        <span class="card-id">${e.id} · ${wk}</span>
        <span class="card-sob" style="background:${bg}">${e.stateOfBeing}</span>
        <span class="card-sdot" style="background:${dot}"></span>
      </div>
      <div class="card-title">${e.keyQuestion}</div>
      ${e.linkedText ? `<div class="card-row"><strong>Text:</strong> ${e.linkedText}</div>` : ''}
      ${e.genre ? `<div class="card-row"><strong>Genre:</strong> ${e.genre}</div>` : ''}
      ${e.writingOutcome ? `<div class="card-row"><strong>Writing:</strong> ${e.writingOutcome}</div>` : ''}
    </div>`;
  }).join('');
}

function openCardDetail(id) {
  selEnq = id; selectView('timeline'); openDetail(id);
}

// ── Cross-year ────────────────────────────────────────────────────────────────
function renderCross() {
  const t = curTerm;
  const allE = YR_KEYS.flatMap(k => (YEAR_DATA[k]?.enquiries||[]).filter(e => e.term === t));
  const states = SOB_ORDER.filter(s => allE.some(e => e.stateOfBeing === s));
  const grid = document.getElementById('cross-grid');
  if (!states.length) { grid.innerHTML = '<div class="empty-state"><h3>No enquiries for this term</h3></div>'; return; }

  const cols = '140px ' + YR_KEYS.map(() => '1fr').join(' ');
  let h = '<div class="cross-grid">';

  // Header
  h += `<div class="cross-hdr-row" style="display:grid;grid-template-columns:${cols};gap:8px">`;
  h += '<div></div>';
  YR_KEYS.forEach(k => {
    const d = YEAR_DATA[k];
    h += `<div style="text-align:center;font-size:12px;font-weight:800;color:${d.colour};padding:6px 0">${k}<br><span style="font-weight:600;color:#64748b;font-size:11px">${d.learningZone.replace(' Learning Zone','')}</span></div>`;
  });
  h += '</div>';

  states.forEach(state => {
    const bg = sc(state);
    h += `<div class="cross-row" style="display:grid;grid-template-columns:${cols};gap:8px;margin-bottom:10px">`;
    h += `<div class="cross-sob-label"><span class="cross-sob-pill" style="background:${bg}">${state}</span></div>`;
    YR_KEYS.forEach(k => {
      const enqs = (YEAR_DATA[k]?.enquiries||[]).filter(e => e.term === t && e.stateOfBeing === state);
      if (!enqs.length) { h += '<div class="cross-cell-empty"></div>'; return; }
      // Wrap all enquiries for this year in a single grid cell
      h += '<div style="display:flex;flex-direction:column;gap:6px">';
      enqs.forEach(e => {
        h += `<div class="cross-cell" onclick="switchToYear('${k}','${e.id}')">
          <div class="c-id">${e.id}</div>
          <div class="c-q">${e.keyQuestion}</div>
          ${e.linkedText ? `<div class="c-text">${e.linkedText.split('·')[0].trim()}</div>` : ''}
        </div>`;
      });
      h += '</div>';
    });
    h += '</div>';
  });

  h += '</div>';
  grid.innerHTML = h;
}

function switchToYear(k, id) { curYear = k; selectView('timeline'); openDetail(id); }

// ── Hash routing ──────────────────────────────────────────────────────────────
function updateHash() {
  if (curView === 'cross') history.replaceState(null,'','#/cross/t'+curTerm);
  else {
    let h = '#/' + curYear.toLowerCase();
    if (curView !== 'timeline') h += '/' + curView + '/t' + curTerm;
    history.replaceState(null,'',h);
  }
}
function readHash() {
  const p = location.hash.replace('#/','').split('/');
  if (!p[0]) return;
  if (p[0]==='cross') { curView='cross'; if(p[1]) curTerm=parseInt(p[1].replace('t',''))||1; }
  else {
    const k = p[0].toUpperCase();
    if (YEAR_DATA[k]) curYear = k;
    if (p[1]==='cards'||p[1]==='timeline') curView=p[1];
    if (p[1]==='cards'||p[1]==='cross') { if(p[2]) curTerm=parseInt(p[2].replace('t',''))||1; }
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
readHash();
buildYearBar();
if (curView==='timeline') renderTimeline();
else if (curView==='cards') { buildTermSel('cards'); renderCards(); }
else { buildTermSel('cross'); renderCross(); }
[{v:'timeline',i:0},{v:'cards',i:1},{v:'cross',i:2}].forEach(({v,i}) => {
  if (v===curView) document.querySelectorAll('.view-tab')[i].classList.add('active');
  else document.querySelectorAll('.view-tab')[i].classList.remove('active');
});
document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
document.getElementById('view-'+curView).classList.add('active');
</script>
</body>
