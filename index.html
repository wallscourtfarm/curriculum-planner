<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WFA Curriculum Planner 2025–26 | Wallscourt Farm Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --text: #1a1a2e;
    --grey: #6b7280;
    --light-grey: #f3f4f6;
    --border: #e5e7eb;
    --yr-colour: #1798d3;
    --yr-dark: #0f6fa3;
    --yr-light: #e0f2fe;
    --yr-mid: #bae0f5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text); background: #f8fafc; line-height: 1.6; }

  /* ── Sticky nav ── */
  nav {
    background: #fff; border-bottom: 2px solid var(--border);
    padding: 0 20px; display: flex; align-items: center; gap: 12px;
    position: sticky; top: 0; z-index: 200; height: 56px; flex-wrap: wrap;
  }
  .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .nav-logo-icon { width: 36px; height: 36px; background: #1798d3; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .nav-logo-icon svg { width: 22px; height: 22px; fill: #fff; }
  .nav-title { font-weight: 900; font-size: 15px; color: #0f172a; }
  .nav-sub { font-size: 11px; color: #64748b; font-weight: 600; }
  .nav-spacer { flex: 1; }
  .nav-export-btn {
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
    background: #f1f5f9; color: #475569; border: 2px solid #e2e8f0;
    cursor: pointer; transition: all .15s;
  }
  .nav-export-btn:hover { background: #e2e8f0; }
  .nav-version { font-size: 11px; color: #94a3b8; font-weight: 700; letter-spacing: .5px; white-space: nowrap; }

  /* ── Year chips bar ── */
  #year-bar {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 8px 20px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .bar-label { font-size: 11px; font-weight: 800; color: var(--grey); text-transform: uppercase; letter-spacing: .06em; margin-right: 4px; }
  .year-chip {
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
    border: 2px solid transparent; cursor: pointer; transition: all .15s;
    background: #f1f5f9; color: #475569;
  }
  .year-chip.active { color: #fff; }
  .year-chip:hover { opacity: .85; }
  .cross-btn {
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
    border: 2px solid #cbd5e1; cursor: pointer; background: #fff; color: #475569;
    transition: all .15s; margin-left: 6px;
  }
  .cross-btn:hover { background: #f1f5f9; }
  .cross-btn.active { background: #0f172a; color: #fff; border-color: #0f172a; }

  /* ── Main content ── */
  #main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }

  /* ── Year header ── */
  .yr-header {
    border-radius: 12px; padding: 24px 28px; margin-bottom: 20px;
    display: flex; align-items: flex-start; gap: 18px;
  }
  .yr-badge {
    background: rgba(255,255,255,.22); color: #fff;
    font-size: 11px; font-weight: 900; letter-spacing: .08em;
    text-transform: uppercase; border-radius: 8px; padding: 4px 10px;
    white-space: nowrap; margin-top: 4px; flex-shrink: 0;
  }
  .yr-header-text h1 { font-size: 22px; font-weight: 900; color: #fff; line-height: 1.2; }
  .yr-header-text p { font-size: 12px; color: rgba(255,255,255,.85); margin-top: 5px; }

  /* ── Jump nav ── */
  .nav-bar {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 28px;
    display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
  }
  .nav-bar .jlabel { font-size: 11px; font-weight: 700; color: var(--grey); text-transform: uppercase; letter-spacing: .06em; margin-right: 4px; }
  .nav-link {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px;
    text-decoration: none; color: var(--grey); border: 1px solid var(--border); transition: all .15s;
  }
  .nav-link:hover { color: var(--text); background: var(--light-grey); }

  /* ── Overview card ── */
  .overview-card { background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 32px; }
  .overview-card > h2 { font-size: 14px; font-weight: 800; padding: 12px 18px; border-bottom: 1px solid var(--border); }
  .overview-grid { display: grid; grid-template-columns: 120px repeat(6, 1fr); overflow-x: auto; }
  .grid-cell { padding: 8px 9px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); font-size: 12px; min-width: 100px; }
  .grid-cell.no-right { border-right: none; }
  .grid-header { font-weight: 800; font-size: 12px; text-align: center; }
  .grid-header .wks { font-size: 10px; font-weight: 600; color: var(--grey); margin-top: 2px; }
  .grid-subject {
    background: #f9fafb; font-weight: 800; font-size: 11px; color: var(--grey);
    text-transform: uppercase; letter-spacing: .04em;
    display: flex; align-items: center; gap: 5px; padding: 8px 10px;
    border-right: 2px solid var(--border);
  }
  .cell-content { display: flex; flex-direction: column; gap: 3px; }
  .cell-tag {
    font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 3px;
    display: inline-block; width: fit-content; color: white;
  }
  .cell-q { font-weight: 700; font-size: 11px; line-height: 1.3; }
  .cell-book { font-size: 10px; color: var(--grey); font-style: italic; }
  .cell-empty { background: #fafafa; }
  .cell-wider {
    background: #fafafa; min-height: 48px; position: relative;
    cursor: pointer; transition: background .12s;
  }
  .cell-wider:hover { background: #f0f4f8; }
  .cell-wider .cell-text { font-size: 11px; line-height: 1.4; color: var(--text); padding: 2px 0; }
  .cell-wider .edit-hint { font-size: 10px; color: #cbd5e1; font-style: italic; }
  .cell-wider .cell-edit-btn {
    position: absolute; top: 4px; right: 4px; background: none; border: none;
    font-size: 12px; cursor: pointer; opacity: 0; transition: opacity .15s; padding: 2px;
  }
  .cell-wider:hover .cell-edit-btn { opacity: 1; }

  /* ── Subject section headers ── */
  .subject-header {
    display: flex; align-items: center; gap: 12px;
    margin: 36px 0 14px; padding-bottom: 10px; border-bottom: 3px solid;
  }
  .subject-header h2 { font-size: 19px; font-weight: 900; }
  .subject-desc { font-size: 13px; color: var(--grey); margin-bottom: 18px; line-height: 1.6; }

  /* ── Enquiry cards ── */
  .enquiry-card {
    background: #fff; border-radius: 12px; border: 1px solid var(--border);
    margin-bottom: 18px; overflow: hidden; position: relative;
  }
  .enquiry-header {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 16px 48px 13px 18px; border-bottom: 1px solid var(--border);
  }
  .enquiry-number {
    width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-weight: 900; font-size: 15px; color: white; flex-shrink: 0; margin-top: 2px;
  }
  .enquiry-meta h3 { font-size: 15px; font-weight: 800; line-height: 1.3; margin-bottom: 7px; }
  .enquiry-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 5px; display: inline-block; }
  .tag-term { background: var(--light-grey); color: var(--text); }
  .tag-text { background: #e0f2fe; color: #0369a1; }
  .tag-genre { background: #ede9fe; color: #5b21b6; }
  .tag-status-new { background: #fef2f2; color: #dc2626; }
  .tag-status-some { background: #fffbeb; color: #d97706; }
  .tag-status-existing { background: #f0fdf4; color: #16a34a; }

  .enquiry-body { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
  .enquiry-section { padding: 14px 18px; border-right: 1px solid var(--border); }
  .enquiry-section:last-child { border-right: none; }
  .enquiry-section h4 {
    font-size: 11px; font-weight: 800; text-transform: uppercase;
    letter-spacing: .06em; color: var(--grey); margin-bottom: 8px;
  }
  .enquiry-section p { font-size: 13px; line-height: 1.65; }
  .enquiry-section .placeholder { font-size: 13px; color: #cbd5e1; font-style: italic; }
  .enquiry-section .content-lines { font-size: 13px; line-height: 1.65; white-space: pre-wrap; }

  .links-row {
    background: var(--light-grey); border-top: 1px solid var(--border);
    padding: 9px 18px; font-size: 12px; color: var(--grey);
  }
  .links-row strong { color: var(--text); font-weight: 700; }

  /* Card edit button */
  .card-edit-btn {
    position: absolute; top: 12px; right: 14px; background: none; border: none;
    font-size: 16px; cursor: pointer; opacity: 0; transition: opacity .15s;
    color: var(--grey); padding: 4px; border-radius: 4px;
  }
  .enquiry-card:hover .card-edit-btn { opacity: 1; }
  .card-edit-btn:hover { background: var(--light-grey); }

  /* ── Wider curriculum tables ── */
  .wider-section { background: #fff; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 18px; }
  .wider-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); font-weight: 800; font-size: 14px; }
  .wider-icon { font-size: 17px; }
  .wider-table { display: grid; grid-template-columns: 110px repeat(6, 1fr); overflow-x: auto; }
  .wt-head { font-size: 11px; font-weight: 800; padding: 6px 9px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--light-grey); color: var(--grey); }
  .wt-head.term-col { text-align: center; font-size: 11px; }
  .wt-head.no-right { border-right: none; }
  .wt-row-label { font-size: 11px; font-weight: 700; padding: 7px 9px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); background: #fafafa; color: var(--grey); display: flex; align-items: flex-start; }
  .wt-row-label.no-bottom { border-bottom: none; }
  .wt-cell {
    padding: 7px 9px; font-size: 11px; line-height: 1.5; border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border); color: var(--text); vertical-align: top;
    position: relative; cursor: pointer; transition: background .12s; min-height: 48px;
  }
  .wt-cell:hover { background: #f8fafc; }
  .wt-cell.no-right { border-right: none; }
  .wt-cell.no-bottom, .wt-row-label.no-bottom { border-bottom: none; }
  .wt-cell .wt-edit-btn {
    position: absolute; top: 4px; right: 4px; background: none; border: none;
    font-size: 12px; cursor: pointer; opacity: 0; transition: opacity .15s; padding: 2px;
  }
  .wt-cell:hover .wt-edit-btn { opacity: 1; }
  .wt-cell .wt-content { font-size: 11px; line-height: 1.5; white-space: pre-wrap; }
  .wt-cell .wt-placeholder { font-size: 11px; color: #d1d5db; font-style: italic; }
  .wt-cell b { font-weight: 700; display: block; margin-bottom: 2px; }
  .wt-cell ul { list-style: disc; padding-left: 13px; margin-top: 2px; }
  .wt-cell ul li { font-size: 11px; line-height: 1.4; padding: 1px 0; }

  /* ── Edit modal ── */
  #edit-modal { display: none; position: fixed; inset: 0; z-index: 1000; }
  #edit-modal.open { display: flex; align-items: center; justify-content: center; }
  .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.45); }
  .modal-card {
    position: relative; background: #fff; border-radius: 14px;
    width: 100%; max-width: 620px; max-height: 90vh; overflow-y: auto;
    padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.2); z-index: 1;
  }
  .modal-title { font-size: 16px; font-weight: 900; margin-bottom: 18px; color: var(--text); line-height: 1.3; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--grey); margin-bottom: 5px; }
  .modal-field input, .modal-field select, .modal-field textarea {
    width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 7px;
    font-family: 'Nunito', sans-serif; font-size: 13px; color: var(--text); background: #fff;
    transition: border-color .15s;
  }
  .modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus {
    outline: none; border-color: #1798d3;
  }
  .modal-field textarea { resize: vertical; }
  .modal-hint { font-size: 11px; color: #94a3b8; margin-top: 3px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .btn-cancel {
    padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 700;
    background: var(--light-grey); color: var(--grey); border: none; cursor: pointer;
  }
  .btn-cancel:hover { background: var(--border); }
  .btn-save {
    padding: 8px 20px; border-radius: 8px; font-size: 13px; font-weight: 800;
    background: #1798d3; color: #fff; border: none; cursor: pointer;
  }
  .btn-save:hover { background: #0f6fa3; }

  /* ── Cross-year overlay ── */
  #cross-overlay { display: none; position: fixed; inset: 0; z-index: 300; background: #fff; overflow-y: auto; }
  #cross-overlay.open { display: block; }
  .cross-top {
    background: #fff; border-bottom: 2px solid var(--border);
    padding: 14px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    position: sticky; top: 0; z-index: 10;
  }
  .cross-title { font-size: 16px; font-weight: 900; color: var(--text); margin-right: 8px; }
  .cross-term-chip {
    padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700;
    border: 2px solid var(--border); cursor: pointer; background: #fff; color: #475569; transition: all .15s;
  }
  .cross-term-chip.active { border-color: #1798d3; background: #1798d3; color: #fff; }
  .cross-close {
    margin-left: auto; padding: 6px 14px; border-radius: 8px; font-size: 14px; font-weight: 800;
    background: #f1f5f9; color: #475569; border: none; cursor: pointer;
  }
  .cross-close:hover { background: var(--border); }
  .cross-body { padding: 20px; overflow-x: auto; }
  .cross-grid { min-width: 900px; }
  .cross-hdr-row { display: grid; padding-bottom: 10px; border-bottom: 2px solid var(--border); margin-bottom: 12px; }
  .cross-row { display: grid; margin-bottom: 10px; align-items: start; }
  .cross-sob-label { display: flex; align-items: flex-start; padding-top: 6px; }
  .cross-sob-pill { display: inline-flex; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 800; color: #fff; }
  .cross-cell { background: #fff; border-radius: 8px; border: 2px solid var(--border); padding: 8px 10px; min-height: 60px; cursor: pointer; transition: border-color .1s; }
  .cross-cell:hover { border-color: #94a3b8; }
  .cross-cell-empty { background: #f8fafc; border-radius: 8px; border: 2px solid transparent; min-height: 60px; }
  .cross-cell .c-id { font-size: 11px; font-weight: 800; color: #94a3b8; }
  .cross-cell .c-q { font-size: 12px; font-weight: 600; color: #1e293b; line-height: 1.3; margin-top: 3px; }
  .cross-cell .c-text { font-size: 11px; color: #94a3b8; margin-top: 4px; }

  /* ── Footer ── */
  footer { padding: 14px 20px; border-top: 1px solid var(--border); margin-top: 20px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: #94a3b8; }
  footer strong { color: #64748b; }

  @media print {
    nav, #year-bar, footer { display: none; }
    .card-edit-btn, .wt-edit-btn, .cell-edit-btn { display: none; }
    .enquiry-card { break-inside: avoid; }
    .wider-section { break-inside: avoid; }
  }
</style>
</head>

// STORAGE
// ════════════════════════════════════════════════════════════
function loadData(k) { try { return JSON.parse(localStorage.getItem('wfa_cp_'+k)||'{}'); } catch { return {}; } }
function saveData(k, d) { localStorage.setItem('wfa_cp_'+k, JSON.stringify(d)); }

function getEnq(k, id) {
  const base = (YEAR_DATA[k]?.enquiries||[]).find(e=>e.id===id) || {};
  const ov = (loadData(k).enquiries||{})[id] || {};
  return {...base, ...ov};
}
function saveEnqField(k, id, fields) {
  const d = loadData(k);
  d.enquiries = d.enquiries || {};
  d.enquiries[id] = {...(d.enquiries[id]||{}), ...fields};
  saveData(k, d);
}
function getWiderCell(k, wkey, rowLabel, termIdx) {
  const d = loadData(k);
  return ((d.wider||{})[wkey]||{})[rowLabel]?.[termIdx] || '';
}
function saveWiderCell(k, wkey, rowLabel, termIdx, value) {
  const d = loadData(k);
  d.wider = d.wider||{};
  d.wider[wkey] = d.wider[wkey]||{};
  d.wider[wkey][rowLabel] = d.wider[wkey][rowLabel]||['','','','','',''];
  d.wider[wkey][rowLabel][termIdx] = value;
  saveData(k, d);
}

// HELPERS

const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const sobBg = s => SOB_BG[s] || '#64748b';

function wkRange(e) {
  const ti = e.term - 1;
  const gs = TERM_GS[ti];
  return e.weekStart === e.weekEnd ? `W${gs+e.weekStart}` : `W${gs+e.weekStart}–${gs+e.weekEnd}`;
}

// YEAR BAR
// ════════════════════════════════════════════════════════════
function buildYearBar() {
  const bar = document.getElementById('year-bar');
  let h = '<span class="bar-label">Year group</span>';
  YR_KEYS.forEach(k => {
    const d = YEAR_DATA[k];
    const zone = d.learningZone.replace(' Learning Zone','');
    const active = k === curYear;
    const style = active ? `background:${d.colour};border-color:${d.colour};color:#fff` : '';
    h += `<button class="year-chip${active?' active':''}" style="${style}" onclick="selectYear('${k}')">${k} · ${zone}</button>`;
  });
  h += `<button class="cross-btn" onclick="openCross()">All years</button>`;
  bar.innerHTML = h;
}

function selectYear(k) {
  curYear = k;
  buildYearBar();
  renderYear(k);
}

function renderYear(k) {
  const d = YEAR_DATA[k];
  const enqs = d.enquiries;
  const yc = d.colour;
  const yd = d.colourDark;
  const yl = d.colourLight;
  const zone = d.learningZone;

  const activeStates = SOB_ORDER.filter(s => enqs.some(e => e.stateOfBeing === s));

  let h = '';

  // ── Header banner ──
  h += `<div class="yr-header" style="background:${yc}">
    <div class="yr-badge">${zone}</div>
    <div class="yr-header-text">
      <h1>Long-Term Enquiry Plan 2025–26</h1>
      <p>${d.phase} · Wallscourt Farm Academy · Writing · Science · Geography · History · Mathematics · Art · DT · Music · PE · RE · PSHE · Computing · MFL · Oracy · Spelling</p>
    </div>
  </div>`;

  // ── Jump nav ──
  h += `<div class="nav-bar"><span class="jlabel">Jump to</span>`;
  activeStates.forEach(s => {
    const m = SOB_META[s];
    h += `<a class="nav-link" href="#s-${s.toLowerCase().replace(/ /g,'-')}" style="border-color:${sobBg(s)};color:${sobBg(s)}">${m.icon} ${s}</a>`;
  });
  WIDER_DEF.forEach(w => {
    h += `<a class="nav-link" href="#s-wider-${w.key}">${w.icon} ${w.name}</a>`;
  });
  h += `</div>`;

  // ── Year at a glance ──
  h += renderGlanceGrid(k, enqs, yc, yd, yl, activeStates);

  // ── Enquiry sections per State of Being ──
  activeStates.forEach(state => {
    const m = SOB_META[state];
    const bg = sobBg(state);
    const sEnqs = enqs.filter(e => e.stateOfBeing === state).sort((a,b)=>a.term-b.term||a.order-b.order);

    h += `<div id="s-${state.toLowerCase().replace(/ /g,'-')}" class="subject-header" style="border-color:${bg};color:${bg}">
      <span style="font-size:20px">${m.icon}</span>
      <h2>${m.heading} — I am a ${m.state}</h2>
    </div>`;

    sEnqs.forEach((e, idx) => {
      const enq = getEnq(k, e.id);
      const wk = wkRange(e);
      const statusCls = enq.planningStatus && enq.planningStatus !== 'unknown' ? `tag-status-${enq.planningStatus}` : '';
      h += `<div class="enquiry-card" id="enq-${e.id}">
        <button class="card-edit-btn" title="Edit this enquiry" onclick="openEnqEdit('${k}','${e.id}')">✏️</button>
        <div class="enquiry-header">
          <div class="enquiry-number" style="background:${bg}">${idx+1}</div>
          <div class="enquiry-meta">
            <h3>${esc(enq.keyQuestion)}</h3>
            <div class="enquiry-tags">
              <span class="tag tag-term">Term ${e.term} · ${wk}</span>
              ${enq.linkedText ? `<span class="tag tag-text">${esc(enq.linkedText)}</span>` : ''}
              ${enq.genre ? `<span class="tag tag-genre">${esc(enq.genre)}</span>` : ''}
              ${statusCls ? `<span class="tag ${statusCls}">${SPILL_TEXT[enq.planningStatus]||''}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="enquiry-body">
          <div class="enquiry-section">
            <h4>Overview</h4>
            ${enq.overview
              ? `<p class="content-lines">${esc(enq.overview)}</p>`
              : `<p class="placeholder">Click ✏️ to add an overview…</p>`}
          </div>
          <div class="enquiry-section">
            <h4>Content / Writing Skills</h4>
            ${enq.contentSkills
              ? `<div class="content-lines">${esc(enq.contentSkills).split('\n').map(l=>l.trim()).filter(Boolean).map(l=>`<div style="padding:2px 0;border-bottom:1px solid #f3f4f6;font-size:13px">${l}</div>`).join('')}</div>`
              : `<p class="placeholder">Click ✏️ to add content or writing skills…</p>`}
          </div>
        </div>
        <div class="links-row">
          <strong>Cross-curricular links:</strong>
          ${enq.crossCurricular ? esc(enq.crossCurricular) : '<em style="color:#cbd5e1">Click ✏️ to add cross-curricular links…</em>'}
        </div>
      </div>`;
    });
  });

  // ── Wider curriculum ──
  h += `<div class="subject-header" style="border-color:${yc};color:${yd}">
    <span style="font-size:20px">📚</span>
    <h2>Wider Curriculum</h2>
  </div>
  <p class="subject-desc">Content for all curriculum areas not covered in the enquiry sections above. Click any cell to add or edit content.</p>`;

  WIDER_DEF.forEach(w => {
    h += renderWiderSection(k, w, yc, yd);
  });

  document.getElementById('main').innerHTML = h;
}

function renderGlanceGrid(k, enqs, yc, yd, yl, activeStates) {
  const wkRanges = [
    `W1–8 · Sep–Oct`, `W9–15 · Nov–Dec`, `W16–21 · Jan–Feb`,
    `W22–27 · Mar–Apr`, `W28–32 · Apr–May`, `W33–39 · Jun–Jul`
  ];
  let h = `<div class="overview-card">
    <h2>Year at a Glance — All Subjects</h2>
    <div class="overview-grid">
      <div class="grid-cell grid-subject" style="background:${yl}">Subject</div>`;

  for (let t = 0; t < 6; t++) {
    h += `<div class="grid-cell grid-header" style="background:${yl};color:${yd}${t===5?';border-right:none':''}">T${t+1}<div class="wks">${wkRanges[t]}</div></div>`;
  }

  // Enquiry subject rows
  activeStates.forEach(state => {
    const bg = sobBg(state);
    const m = SOB_META[state];
    h += `<div class="grid-cell grid-subject">${m.icon} ${state}</div>`;
    for (let t = 0; t < 6; t++) {
      const term = t + 1;
      const termEnqs = enqs.filter(e => e.stateOfBeing === state && e.term === term);
      if (!termEnqs.length) {
        h += `<div class="grid-cell cell-empty${t===5?' no-right':''}"></div>`;
      } else {
        h += `<div class="grid-cell${t===5?' no-right':''}" style="background:${bg}20">`;
        termEnqs.forEach(e => {
          const enq = getEnq(k, e.id);
          const wk = wkRange(e);
          h += `<div class="cell-content" style="margin-bottom:4px">
            <span class="cell-tag" style="background:${bg}">${e.id} · ${wk}</span>
            <div class="cell-q">${esc(enq.keyQuestion)}</div>
            ${enq.linkedText ? `<div class="cell-book">${esc(enq.linkedText.split('·')[0].trim())}</div>` : ''}
          </div>`;
        });
        h += `</div>`;
      }
    }
  });

  // Wider curriculum rows (editable)
  WIDER_DEF.forEach(w => {
    h += `<div class="grid-cell grid-subject" style="color:${w.colour}">${w.icon} ${w.name}</div>`;
    for (let t = 0; t < 6; t++) {
      // Show first row's content for this term
      const firstRow = w.rows[0];
      const val = getWiderCell(k, w.key, firstRow.label, t);
      const last = t === 5 ? ' no-right' : '';
      h += `<div class="grid-cell cell-wider${last}" onclick="openWiderEdit('${k}','${w.key}','${firstRow.label}',${t})">
        <button class="cell-edit-btn" onclick="event.stopPropagation();openWiderEdit('${k}','${w.key}','${firstRow.label}',${t})">✏️</button>
        ${val ? `<div class="cell-text">${esc(val)}</div>` : `<div class="edit-hint">Add content…</div>`}
      </div>`;
    }
  });

  h += `</div></div>`;
  return h;
}

function renderWiderSection(k, w, yc, yd) {
  let h = `<div class="wider-section" id="s-wider-${w.key}" style="border-left:3px solid ${w.colour}">
    <div class="wider-header" style="color:${w.colour}">
      <span class="wider-icon">${w.icon}</span>
      ${w.name}${w.state ? ` — ${w.state}` : ''}
    </div>
    <div class="wider-table">
      <div class="wt-head">Focus</div>`;

  for (let t = 0; t < 6; t++) {
    const nm = `T${t+1} · W${TERM_GS[t]+1}–${TERM_GS[t]+TERM_WK[t]}`;
    h += `<div class="wt-head term-col${t===5?' no-right':''}" style="background:${w.colour}18;color:${w.colour}">${nm}</div>`;
  }

  w.rows.forEach((row, ri) => {
    const isLast = ri === w.rows.length - 1;
    h += `<div class="wt-row-label${isLast?' no-bottom':''}">${row.label}</div>`;
    for (let t = 0; t < 6; t++) {
      const val = getWiderCell(k, w.key, row.label, t);
      const nr = t===5 ? ' no-right' : '';
      const nb = isLast ? ' no-bottom' : '';
      h += `<div class="wt-cell${nr}${nb}" onclick="openWiderEdit('${k}','${w.key}','${esc(row.label)}',${t})">
        <button class="wt-edit-btn" onclick="event.stopPropagation();openWiderEdit('${k}','${w.key}','${esc(row.label)}',${t})">✏️</button>
        ${val
          ? `<div class="wt-content">${esc(val)}</div>`
          : `<span class="wt-placeholder">Click to add…</span>`}
      </div>`;
    }
  });

  h += `</div></div>`;
  return h;
}

// ════════════════════════════════════════════════════════════
// EDIT MODAL
// ════════════════════════════════════════════════════════════
let _modalSave = null;

function openModal(title, bodyHTML, saveFn) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  _modalSave = saveFn;
  document.getElementById('edit-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('edit-modal').classList.remove('open');
  _modalSave = null;
}
function saveModal() {
  if (_modalSave) _modalSave();
  closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeCross(); } });

function openEnqEdit(k, id) {
  const enq = getEnq(k, id);
  const genres = ['Entertain','Inform','Explain','Persuade','Argue','Recount','Instruct',''];
  const statuses = ['unknown','new','some','existing'];

  const body = `
    <div class="modal-field">
      <label>Key Question</label>
      <input id="ef-kq" type="text" value="${esc(enq.keyQuestion||'')}">
    </div>
    <div class="modal-field">
      <label>Linked Text</label>
      <input id="ef-lt" type="text" value="${esc(enq.linkedText||'')}">
    </div>
    <div class="modal-field">
      <label>Genre</label>
      <select id="ef-genre">
        ${genres.map(g=>`<option value="${g}"${enq.genre===g?' selected':''}>${g||'— none —'}</option>`).join('')}
      </select>
    </div>
    <div class="modal-field">
      <label>Writing Outcome</label>
      <input id="ef-wo" type="text" value="${esc(enq.writingOutcome||'')}">
    </div>
    <div class="modal-field">
      <label>Planning Status</label>
      <select id="ef-ps">
        ${statuses.map(s=>`<option value="${s}"${enq.planningStatus===s?' selected':''}>${SPILL_TEXT[s]||s}</option>`).join('')}
      </select>
    </div>
    <div class="modal-field">
      <label>Overview</label>
      <textarea id="ef-ov" rows="4">${esc(enq.overview||'')}</textarea>
    </div>
    <div class="modal-field">
      <label>Content / Writing Skills</label>
      <textarea id="ef-cs" rows="5">${esc(enq.contentSkills||'')}</textarea>
      <div class="modal-hint">One skill or point per line.</div>
    </div>
    <div class="modal-field">
      <label>Cross-Curricular Links</label>
      <textarea id="ef-cc" rows="2">${esc(enq.crossCurricular||'')}</textarea>
    </div>`;

  openModal(`Editing Enquiry ${id}`, body, () => {
    saveEnqField(k, id, {
      keyQuestion:   document.getElementById('ef-kq').value,
      linkedText:    document.getElementById('ef-lt').value,
      genre:         document.getElementById('ef-genre').value,
      writingOutcome:document.getElementById('ef-wo').value,
      planningStatus:document.getElementById('ef-ps').value,
      overview:      document.getElementById('ef-ov').value,
      contentSkills: document.getElementById('ef-cs').value,
      crossCurricular:document.getElementById('ef-cc').value,
    });
    renderYear(k);
  });
}

function openWiderEdit(k, wkey, rowLabel, termIdx) {
  const val = getWiderCell(k, wkey, rowLabel, termIdx);
  const w = WIDER_DEF.find(x => x.key === wkey);
  const termName = TERM_NM[termIdx];

  const body = `
    <div class="modal-field">
      <label>${w ? w.name : wkey} — ${rowLabel} — ${termName}</label>
      <textarea id="wf-val" rows="6">${esc(val)}</textarea>
      <div class="modal-hint">Plain text. Each line becomes a separate bullet when displayed.</div>
    </div>`;

  openModal(`Edit: ${rowLabel} · ${termName}`, body, () => {
    saveWiderCell(k, wkey, rowLabel, termIdx, document.getElementById('wf-val').value);
    renderYear(k);
  });
}

// ════════════════════════════════════════════════════════════
// CROSS-YEAR OVERLAY
// ════════════════════════════════════════════════════════════
function openCross() {
  buildCrossTermChips();
  renderCross();
  document.getElementById('cross-overlay').classList.add('open');
}
function closeCross() {
  document.getElementById('cross-overlay').classList.remove('open');
}

function buildCrossTermChips() {
  const el = document.getElementById('cross-term-chips');
  el.innerHTML = TERM_NM.map((nm,i) =>
    `<button class="cross-term-chip${crossTerm===i+1?' active':''}" onclick="setCrossTerm(${i+1})">${nm}</button>`
  ).join('');
}

function setCrossTerm(t) {
  crossTerm = t;
  buildCrossTermChips();
  renderCross();
}

function renderCross() {
  const t = crossTerm;
  const allE = YR_KEYS.flatMap(k => (YEAR_DATA[k]?.enquiries||[]).filter(e => e.term === t));
  const states = SOB_ORDER.filter(s => allE.some(e => e.stateOfBeing === s));
  const grid = document.getElementById('cross-grid');
  if (!states.length) { grid.innerHTML = '<p style="color:#94a3b8;padding:20px">No enquiries for this term.</p>'; return; }

  const cols = `140px ${YR_KEYS.map(()=>'1fr').join(' ')}`;
  let h = '';

  // Header row
  h += `<div class="cross-hdr-row" style="display:grid;grid-template-columns:${cols};gap:8px">`;
  h += '<div></div>';
  YR_KEYS.forEach(k => {
    const d = YEAR_DATA[k];
    h += `<div style="text-align:center;font-size:12px;font-weight:800;color:${d.colour};padding:6px 0">${k}<br><span style="font-weight:600;color:#64748b;font-size:11px">${d.learningZone.replace(' Learning Zone','')}</span></div>`;
  });
  h += '</div>';

  states.forEach(state => {
    const bg = sobBg(state);
    h += `<div class="cross-row" style="display:grid;grid-template-columns:${cols};gap:8px;margin-bottom:10px">`;
    h += `<div class="cross-sob-label"><span class="cross-sob-pill" style="background:${bg}">${state}</span></div>`;
    YR_KEYS.forEach(k => {
      const enqs = (YEAR_DATA[k]?.enquiries||[]).filter(e => e.term === t && e.stateOfBeing === state);
      if (!enqs.length) { h += '<div class="cross-cell-empty"></div>'; return; }
      h += '<div style="display:flex;flex-direction:column;gap:6px">';
      enqs.forEach(e => {
        const enq = getEnq(k, e.id);
        h += `<div class="cross-cell" onclick="crossNav('${k}','${e.id}')">
          <div class="c-id">${e.id}</div>
          <div class="c-q">${esc(enq.keyQuestion)}</div>
          ${enq.linkedText ? `<div class="c-text">${esc(enq.linkedText.split('·')[0].trim())}</div>` : ''}
        </div>`;
      });
      h += '</div>';
    });
    h += '</div>';
  });

  grid.innerHTML = h;
}

function crossNav(k, id) {
  closeCross();
  curYear = k;
  buildYearBar();
  renderYear(k);
  // Scroll to the enquiry card after a short delay for the render to complete
  setTimeout(() => {
    const el = document.getElementById('enq-' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

// ════════════════════════════════════════════════════════════
// EXPORT JSON
// ════════════════════════════════════════════════════════════
function exportJSON() {
  const k = curYear;
  const d = YEAR_DATA[k];
  const ld = loadData(k);
  const merged = {
    yearGroup: k,
    learningZone: d.learningZone,
    colour: d.colour,
    exportDate: new Date().toISOString().slice(0,10),
    enquiries: d.enquiries.map(e => getEnq(k, e.id)),
    wider: ld.wider || {}
  };
  const blob = new Blob([JSON.stringify(merged, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wfa-curriculum-${k}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
buildYearBar();
renderYear(curYear);
</script>
